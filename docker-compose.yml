# ============================================
# WC2026 世界杯预测网站 - Docker Compose 配置
# 适合 QNAP Container Station / Docker Compose
# ============================================

services:
  # ---------- 后端（FastAPI）----------
  backend:
    build:
      context: ${PROJECT_DIR:-/share/CACHEDEV1_DATA/Web/wc2026}/backend
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-public.ecr.aws/docker/library/python:3.13-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
    image: wc2026-backend:latest
    container_name: wc2026-backend
    environment:
      PORT: "8000"
      DATABASE_URL: "sqlite+aiosqlite:////app/data/wc2026.db"
      AUTH_ENABLED: "${AUTH_ENABLED:-true}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      AUTH_SESSION_SECRET: "${AUTH_SESSION_SECRET:-}"
      AUTH_SESSION_MAX_AGE_SECONDS: "${AUTH_SESSION_MAX_AGE_SECONDS:-604800}"
      AUTH_COOKIE_SECURE: "${AUTH_COOKIE_SECURE:-false}"
      LIVE_SYNC_ENABLED: "${LIVE_SYNC_ENABLED:-true}"
      LIVE_SYNC_INTERVAL_SECONDS: "${LIVE_SYNC_INTERVAL_SECONDS:-60}"
      LIVE_FEED_STALE_SECONDS: "${LIVE_FEED_STALE_SECONDS:-43200}"
      LOCAL_MATCH_FEED_ENABLED: "${LOCAL_MATCH_FEED_ENABLED:-true}"
      MATCH_FEED_PATH: "/app/data/matches.live.json"
      MATCH_FEED_URL: "${MATCH_FEED_URL:-}"
      MATCH_RESULTS_BACKFILL_PATH: "/app/data/matches.public-results.json"
      MATCH_RESULTS_BACKFILL_URL: "${MATCH_RESULTS_BACKFILL_URL:-}"
      ESPN_SCOREBOARD_ENABLED: "${ESPN_SCOREBOARD_ENABLED:-true}"
      ESPN_SCOREBOARD_START_DATE: "${ESPN_SCOREBOARD_START_DATE:-20260611}"
      ESPN_SCOREBOARD_MAX_DAYS: "${ESPN_SCOREBOARD_MAX_DAYS:-60}"
      ESPN_SCOREBOARD_DAYS_BACK: "${ESPN_SCOREBOARD_DAYS_BACK:-14}"
      ESPN_SCOREBOARD_DAYS_FORWARD: "${ESPN_SCOREBOARD_DAYS_FORWARD:-2}"
      ESPN_SCOREBOARD_TIMEOUT_SECONDS: "${ESPN_SCOREBOARD_TIMEOUT_SECONDS:-8}"
      ESPN_SCOREBOARD_MAX_WORKERS: "${ESPN_SCOREBOARD_MAX_WORKERS:-6}"
      API_FOOTBALL_ENABLED: "${API_FOOTBALL_ENABLED:-false}"
      API_FOOTBALL_KEY: "${API_FOOTBALL_KEY:-}"
      API_FOOTBALL_LEAGUE_ID: "${API_FOOTBALL_LEAGUE_ID:-1}"
      API_FOOTBALL_SEASON: "${API_FOOTBALL_SEASON:-2026}"
      SPORTMONKS_ENABLED: "${SPORTMONKS_ENABLED:-true}"
      SPORTMONKS_TOKEN: "${SPORTMONKS_TOKEN:-}"
      SPORTMONKS_API_TOKEN: "${SPORTMONKS_API_TOKEN:-}"
      SPORTMONKS_TIMEOUT_SECONDS: "${SPORTMONKS_TIMEOUT_SECONDS:-12}"
      SPORTMONKS_TEAM_IDS_JSON: "${SPORTMONKS_TEAM_IDS_JSON:-}"
      INJURY_FEED_PATH: "/app/data/injuries.json"
      ODDS_MARKET_ENABLED: "${ODDS_MARKET_ENABLED:-true}"
      ODDS_PROVIDER: "${ODDS_PROVIDER:-the_odds_api}"
      THE_ODDS_API_KEY: "${THE_ODDS_API_KEY:-}"
      THE_ODDS_API_SPORT_KEY: "${THE_ODDS_API_SPORT_KEY:-soccer_fifa_world_cup}"
      THE_ODDS_API_REGIONS: "${THE_ODDS_API_REGIONS:-us,eu,uk}"
      THE_ODDS_API_MARKETS: "${THE_ODDS_API_MARKETS:-h2h,totals,spreads}"
      THE_ODDS_API_ODDS_FORMAT: "${THE_ODDS_API_ODDS_FORMAT:-decimal}"
      THE_ODDS_API_TIMEOUT_SECONDS: "${THE_ODDS_API_TIMEOUT_SECONDS:-8}"
    volumes:
      - ${PROJECT_DIR:-/share/CACHEDEV1_DATA/Web/wc2026}/backend/data:/app/data
    expose:
      - "8000"
    restart: unless-stopped
    networks:
      - wc2026-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------- 前端（Nginx 静态托管 + /api 反代后端）----------
  frontend:
    build:
      context: ${PROJECT_DIR:-/share/CACHEDEV1_DATA/Web/wc2026}/frontend
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-}
    image: wc2026-frontend:latest
    container_name: wc2026-frontend
    ports:
      - "${APP_PORT:-12026}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - wc2026-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  wc2026-net:
    driver: bridge
